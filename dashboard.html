<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Irmãos na Obra — Energia Solar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --am:#F6A623;--am2:#FFD076;--am3:#C47F0A;
  --cy:#22D3EE;--em:#34D399;--em2:#6EE7B7;
  --ro:#FB7185;--vi:#A78BFA;
  --s100:#F1F5F9;--s300:#CBD5E1;--s400:#94A3B8;--s500:#64748B;
  --s600:#475569;--s700:#334155;--s800:#1E293B;--s900:#0F172A;--s950:#020617
}
body{background:var(--s950);color:var(--s100);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--s900)}
::-webkit-scrollbar-thumb{background:var(--s600);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* HEADER */
.header{
  background:var(--s900);
  padding:14px 16px 10px;
  border-bottom:1px solid var(--s700);
  position:sticky;top:0;z-index:100;
}
.header-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo-img{width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0}
.brand h1{font-size:16px;font-weight:800;letter-spacing:-.3px;color:var(--s100)}
.brand p{font-size:10px;color:var(--s500);font-weight:500}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.filters input,.filters select{
  background:var(--s800);color:var(--s100);border:1px solid var(--s700);
  border-radius:8px;padding:6px 10px;font-size:12px;outline:none;font-family:inherit;
}
.filters input{flex:1;min-width:120px}
.filters select{max-width:140px}
.filters input::placeholder{color:var(--s500)}
.btn-clear{
  background:rgba(251,113,133,.12);color:var(--ro);border:none;border-radius:6px;
  padding:6px 10px;font-size:11px;cursor:pointer;font-weight:700;font-family:inherit;display:none
}
.tabs{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:11px;
  font-weight:700;font-family:inherit;background:transparent;color:var(--s400);
  white-space:nowrap;flex-shrink:0;transition:all .2s;display:flex;align-items:center;gap:4px;
}
.tab.active{background:linear-gradient(135deg,var(--am),var(--am3));color:var(--s950);box-shadow:0 2px 8px rgba(246,166,35,.2)}
.tab .badge-alert{background:var(--ro);color:#fff;border-radius:8px;padding:0 5px;font-size:8px;font-weight:800;animation:pulse 2s infinite}

/* CONTENT */
.content{padding:14px 16px 40px;max-width:1300px;margin:0 auto}
.filter-info{
  margin-bottom:12px;padding:8px 12px;background:rgba(246,166,35,.06);
  border:1px solid rgba(246,166,35,.12);border-radius:8px;font-size:11px;color:var(--am);font-weight:600;display:none
}
.panel{display:none}.panel.active{display:block}

/* KPI CARDS */
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.kpi{
  background:var(--s800);border-radius:10px;padding:12px 14px;border:1px solid var(--s700);
  animation:fadeIn .4s ease both;
}
.kpi:nth-child(1){animation-delay:0s}.kpi:nth-child(2){animation-delay:.05s}
.kpi:nth-child(3){animation-delay:.1s}.kpi:nth-child(4){animation-delay:.15s}.kpi:nth-child(5){animation-delay:.2s}
.kpi-label{color:var(--s400);font-size:9px;text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.kpi-value{font-size:20px;margin:5px 0 2px;font-weight:800;font-family:'DM Mono',monospace;line-height:1}
.kpi-sub{color:var(--s500);font-size:10px}

/* CARDS */
.card{background:var(--s800);border-radius:10px;padding:14px;border:1px solid var(--s700);margin-bottom:10px}
.card-title{color:var(--s100);font-size:12px;font-weight:700;margin-bottom:12px}

/* CHART WRAPPER - CRITICAL FOR SIZING */
.chart-box{position:relative;width:100%;height:200px}
.chart-box canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important}

/* GRID LAYOUTS */
.row{display:grid;gap:10px;margin-bottom:10px}
.row-1{grid-template-columns:1fr}
.row-2{grid-template-columns:1fr}

/* LEGEND */
.leg-item{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.leg-name{font-size:11px;color:var(--s300);flex:1}
.leg-val{font-weight:800;font-size:12px;font-family:'DM Mono',monospace}
.leg-extra{font-size:10px;color:var(--s500);margin-left:4px}

/* CONSULTANT CARDS */
.cons-card{background:var(--s800);border-radius:10px;padding:14px;border:1px solid var(--s700);position:relative;overflow:hidden;animation:fadeIn .4s ease both}
.cons-bar{position:absolute;top:0;left:0;right:0;height:3px}
.cons-name{font-size:16px;font-weight:800;margin:6px 0 12px}
.cons-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cons-label{color:var(--s500);font-size:9px;text-transform:uppercase;letter-spacing:.6px}
.cons-val{font-size:17px;font-weight:800;margin-top:2px;font-family:'DM Mono',monospace}
.cons-val-sm{font-size:13px;font-weight:700;margin-top:2px;font-family:'DM Mono',monospace}
.prog-wrap{margin-top:10px}
.prog-head{display:flex;justify-content:space-between;font-size:9px;color:var(--s500);margin-bottom:3px}
.prog-track{height:4px;background:var(--s700);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--em),var(--em2));border-radius:2px;transition:width .8s ease}

/* TOP LUCRO */
.top-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--s900);border-radius:8px;border:1px solid var(--s700);margin-bottom:6px;
  animation:fadeIn .3s ease both;
}
.top-rank{font-size:16px;font-weight:900;font-family:'DM Mono',monospace;width:22px;text-align:center;flex-shrink:0}
.top-info{flex:1;min-width:0}
.top-name{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-detail{font-size:10px;color:var(--s400);margin-top:1px}
.top-right{text-align:right;flex-shrink:0}
.top-lucro{font-size:14px;font-weight:800;color:var(--em);font-family:'DM Mono',monospace}
.top-pct{font-size:9px;color:var(--s400)}

/* TABLE */
.table-wrap{overflow-x:auto;max-height:400px;overflow-y:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:separate;border-spacing:0 2px;font-size:11px;min-width:650px}
thead th{padding:7px 5px;font-weight:700;color:var(--s500);font-size:9px;text-transform:uppercase;letter-spacing:.6px;position:sticky;top:0;background:var(--s800);z-index:2;white-space:nowrap}
tbody tr{background:var(--s900);transition:background .15s}
tbody tr:hover{background:var(--s700)}
tbody td{padding:8px 5px}
tbody td:first-child{border-radius:6px 0 0 6px}
tbody td:last-child{border-radius:0 6px 6px 0}

.badge{padding:3px 8px;border-radius:12px;font-size:9px;font-weight:700;white-space:nowrap}
.b-ok{background:rgba(52,211,153,.12);color:var(--em)}
.b-warn{background:rgba(246,166,35,.12);color:var(--am)}
.b-err{background:rgba(251,113,133,.12);color:var(--ro)}
.b-muted{background:rgba(100,116,139,.12);color:var(--s400)}

.mono{font-family:'DM Mono',monospace}.bold{font-weight:700}.semi{font-weight:600}
.r{text-align:right}.c{text-align:center}
.c-am{color:var(--am)}.c-em{color:var(--em)}.c-ro{color:var(--ro)}.c-cy{color:var(--cy)}.c-vi{color:var(--vi)}.c-m{color:var(--s400)}

/* ALERT ROWS */
.alert-item{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:var(--s900);border-radius:8px;margin-bottom:5px;animation:fadeIn .3s ease both;
}
.alert-bw{border-left:3px solid var(--am)}
.alert-be{border-left:3px solid var(--ro)}
.equip-grid{display:grid;grid-template-columns:1fr;gap:5px}
.equip-item{padding:8px 10px;background:var(--s900);border-radius:6px;border-left:3px solid var(--cy)}

.forn-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--s900);border-radius:8px;margin-bottom:6px}
.forn-badge{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0}
.empty-msg{color:var(--em);font-size:12px;font-weight:600}

/* DESKTOP */
@media(min-width:640px){
  .header{padding:16px 24px 12px}
  .content{padding:16px 24px 48px}
  .kpis{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
  .kpi-value{font-size:24px}
  .row-2{grid-template-columns:1fr 1fr}
  .chart-box{height:220px}
  .cons-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
  .top-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .top-grid .top-item{margin-bottom:0}
  .equip-grid{grid-template-columns:1fr 1fr}
  .logo-img{width:48px;height:48px}
  .brand h1{font-size:20px}
}
@media(min-width:1024px){
  .header{padding:18px 32px 14px}
  .content{padding:20px 32px 48px}
  .chart-box{height:240px}
  .row-3{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>

// Build tabs
const TABS=[{k:'geral',l:'Geral',i:'◎'},{k:'financeiro',l:'Financeiro',i:'◈'},{k:'equipe',l:'Equipe',i:'◉'},{k:'projetos',l:'Projetos',i:'◆'},{k:'alertas',l:'Alertas',i:'◇'}];
TABS.forEach(t=>{

  b.className='tab'+(t.k==='geral'?' active':'');

});

function switchTab(k){
  activeTab=k;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===k));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='p-'+k));
  render();
}

function getFiltered(){
  const c=document.getElementById('fConsultor').value;
  const s=document.getElementById('fStatus').value;
  const q=document.getElementById('searchInput').value.toLowerCase();
  return DATA.filter(d=>{
    if(c!=='Todos'&&d.co!==c)return false;
    if(s!=='Todos'&&d.st!==s)return false;
    if(q&&!d.n.toLowerCase().includes(q)&&!d.id.includes(q)&&!(d.ci||'').toLowerCase().includes(q))return false;
    return true;
  });
}

function stats(d){
  const t=d.length,qt=d.filter(x=>x.st==='Quitado'),it=d.filter(x=>x.ins);
  const tv=d.reduce((a,x)=>a+x.v,0),tr=d.reduce((a,x)=>a+x.r,0);
  const cl=qt.filter(x=>x.pl>0),tl=cl.reduce((a,x)=>a+x.lu,0);
  const mg=cl.length?cl.reduce((a,x)=>a+x.pl,0)/cl.length:0;
  const tp=d.reduce((a,x)=>a+x.qp,0),pw=d.reduce((a,x)=>a+(x.qp*x.pp),0)/1000;
  const tk=t?tv/t:0,ar=tv-tr;

  // By consultant
  const co={};d.forEach(x=>{if(!co[x.co])co[x.co]={v:0,vl:0,rc:0,i:0};co[x.co].v++;co[x.co].vl+=x.v;co[x.co].rc+=x.r;if(x.ins)co[x.co].i++});
  const cd=Object.entries(co).map(([n,v])=>({n,...v,tk:v.vl/v.v})).sort((a,b)=>b.vl-a.vl);

  // By origin
  const or={};d.forEach(x=>{const o=x.or.includes('Indicação')||x.or.startsWith('#')?'Indicação':x.or;if(!or[o])or[o]={c:0,vl:0};or[o].c++;or[o].vl+=x.v});
  const od=Object.entries(or).map(([n,v])=>({n,...v}));

  // By city
  const ci={};d.filter(x=>x.ci).forEach(x=>{ci[x.ci]=(ci[x.ci]||0)+1});
  const cid=Object.entries(ci).map(([n,c])=>({n,c})).sort((a,b)=>b.c-a.c).slice(0,8);

  // By month
  const ms={};d.forEach(x=>{const dt=new Date(x.dt),k=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');const l=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][dt.getMonth()]+'/'+String(dt.getFullYear()).slice(2);if(!ms[k])ms[k]={k:k,l:l,c:0,vl:0,rc:0};ms[k].c++;ms[k].vl+=x.v;ms[k].rc+=x.r});
  const md=Object.values(ms).sort((a,b)=>a.k.localeCompare(b.k));

  // By supplier
  const fo={};d.filter(x=>x.fo).forEach(x=>{const f=x.fo.replace(/sollar|Sollar/gi,'Soollar').replace(/Shakitsun|Shaktisun/gi,'ShaktiSun');if(!fo[f])fo[f]={c:0,vk:0};fo[f].c++;fo[f].vk+=x.vk});
  const fd=Object.entries(fo).map(([n,v])=>({n,...v})).sort((a,b)=>b.c-a.c);

  // Payment status
  const sd=[{n:'Quitado',v:qt.length},{n:'Não Quitado',v:d.filter(x=>x.st==='Não Quitado').length},{n:'Falta Partes',v:d.filter(x=>x.st==='Falta Partes').length}].filter(x=>x.v>0);

  // Payment method
  const pg={};d.filter(x=>x.fp).forEach(x=>{const p=x.fp.includes('Pix')&&x.fp.includes('Cartão')?'Pix+Cartão':x.fp.includes('Pix')?'Pix':x.fp.includes('Cartão')?'Cartão':x.fp.includes('Financ')?'Financ.':x.fp.includes('Sicre')||x.fp.includes('Sicoo')?'Cooperativa':x.fp;if(!pg[p])pg[p]={c:0,vl:0};pg[p].c++;pg[p].vl+=x.v});
  const pd=Object.entries(pg).map(([n,v])=>({n,...v})).sort((a,b)=>b.c-a.c);

  const topL=[...d].filter(x=>x.pl>0).sort((a,b)=>b.lu-a.lu).slice(0,6);
  const alerts=d.filter(x=>x.st!=='Quitado'||!x.lib);
  const pComp=d.filter(x=>x.sp==='Comprar');
  const se={};d.filter(x=>x.sp).forEach(x=>{se[x.sp]=(se[x.sp]||0)+1});
  const ed=Object.entries(se).map(([n,v])=>({n,v})).sort((a,b)=>b.v-a.v);

  return{t,nq:qt.length,ni:it.length,tv,tr,tl,mg,tp,pw,tk,ar,cd,od,cid,md,fd,sd,pd,topL,alerts,pComp,ed};
}

const CD={
  plugins:{legend:{labels:{color:'#94A3B8',font:{family:"'DM Sans'",size:10},boxWidth:10,padding:8}},tooltip:{backgroundColor:'#0F172A',borderColor:'#475569',borderWidth:1,titleColor:'#CBD5E1',bodyColor:'#F1F5F9',padding:10,cornerRadius:8,titleFont:{family:"'DM Sans'",weight:'600',size:11},bodyFont:{family:"'DM Mono'",size:11}}},

};

function mc(id,cfg){const el=document.getElementById(id);if(!el)return;if(charts[id])charts[id].destroy();charts[id]=new Chart(el,cfg)}

function KPI(lb,vl,sb,cl,ic){return '<div class="kpi"><p class="kpi-label">'+lb+'</p><p class="kpi-value" style="color:'+cl+'">'+vl+'</p>'+(sb?'<p class="kpi-sub">'+sb+'</p>':'')+'</div>'}

function bc(st){return st==='Quitado'?'b-ok':st==='Não Quitado'?'b-warn':'b-err'}

function render(){
  const d=getFiltered(),s=stats(d);
  const hasF=document.getElementById('fConsultor').value!=='Todos'||document.getElementById('fStatus').value!=='Todos'||document.getElementById('searchInput').value;
  document.getElementById('btnClear').style.display=hasF?'inline-block':'none';
  const fi=document.getElementById('filterInfo');fi.style.display=hasF?'block':'none';
  fi.textContent='Filtro ativo — '+d.length+' de '+DATA.length+' projetos';
  const ab=document.getElementById('alertBadge');
  if(ab){ab.textContent=s.alerts.length;ab.style.display=s.alerts.length?'inline':'none'}

  // Scale cap: exclude outlier >100k for Y axis max
  const yCapVals=s.md.map(m=>m.vl).filter(v=>v<100000);
  const yCap=yCapVals.length?Math.ceil(Math.max(...yCapVals)*1.2):50000;

  if(activeTab==='geral'){
    let h='<div class="kpis">'+KPI('Faturamento',fk(s.tv),s.t+' proj.','var(--am)')+KPI('Recebido',fk(s.tr),s.nq+' quit.','var(--em)')+KPI('A Receber',fk(s.ar),(s.t-s.nq)+' pend.','var(--ro)')+KPI('Ticket Médio',fk(s.tk),'','var(--cy)')+KPI('Potência',s.pw.toFixed(1)+' kWp',s.tp+' placas','var(--vi)')+'</div>';
    h+='<div class="row row-2"><div class="card"><p class="card-title">Evolução Mensal</p><div class="chart-box"><canvas id="ch1"></canvas></div></div><div class="card"><p class="card-title">Status Pagamentos</p><div class="chart-box" style="height:170px"><canvas id="ch2"></canvas></div><div id="leg2" style="margin-top:8px"></div></div></div>';
    h+='<div class="row row-1 row-3"><div class="card"><p class="card-title">Cidades</p><div class="chart-box"><canvas id="ch3"></canvas></div></div><div class="card"><p class="card-title">Origem dos Leads</p><div class="chart-box" style="height:160px"><canvas id="ch4"></canvas></div><div id="leg4" style="margin-top:6px"></div></div><div class="card"><p class="card-title">Forma de Pagamento</p><div class="chart-box" style="height:160px"><canvas id="ch5"></canvas></div><div id="leg5" style="margin-top:6px"></div></div></div>';
    document.getElementById('p-geral').innerHTML=h;

    mc('ch1',{type:'line',data:{labels:s.md.map(m=>m.l),datasets:[{label:'Valor',data:s.md.map(m=>m.vl),borderColor:'#F6A623',backgroundColor:'rgba(246,166,35,.1)',fill:true,tension:.4,pointRadius:3,borderWidth:2},{label:'Recebido',data:s.md.map(m=>m.rc),borderColor:'#34D399',backgroundColor:'rgba(52,211,153,.06)',fill:true,tension:.4,pointRadius:2,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,...CD,scales:{...CD.scales,y:{...CD.scales.y,suggestedMax:yCap,beginAtZero:true,ticks:{...CD.scales.y.ticks,callback:v=>fk(v)}}}}});
    mc('ch2',{type:'doughnut',data:{labels:s.sd.map(x=>x.n),datasets:[{data:s.sd.map(x=>x.v),backgroundColor:['#34D399','#F6A623','#FB7185'],borderWidth:0,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{...CD.plugins,legend:{display:false}}}});
    let l2='';s.sd.forEach((x,i)=>{const c=['#34D399','#F6A623','#FB7185'][i];l2+='<div class="leg-item"><div class="leg-dot" style="background:'+c+'"></div><span class="leg-name">'+x.n+'</span><span class="leg-val">'+x.v+'</span></div>'});document.getElementById('leg2').innerHTML=l2;

    mc('ch3',{type:'bar',data:{labels:s.cid.map(x=>x.n),datasets:[{data:s.cid.map(x=>x.c),backgroundColor:'#22D3EE',borderRadius:4,barThickness:14}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,...CD,plugins:{...CD.plugins,legend:{display:false}}}});
    mc('ch4',{type:'doughnut',data:{labels:s.od.map(x=>x.n),datasets:[{data:s.od.map(x=>x.c),backgroundColor:CL,borderWidth:0,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{...CD.plugins,legend:{display:false}}}});
    let l4='';s.od.forEach((x,i)=>{l4+='<div class="leg-item"><div class="leg-dot" style="background:'+CL[i]+'"></div><span class="leg-name">'+x.n+'</span><span class="leg-val">'+x.c+'</span></div>'});document.getElementById('leg4').innerHTML=l4;
    mc('ch5',{type:'doughnut',data:{labels:s.pd.map(x=>x.n),datasets:[{data:s.pd.map(x=>x.c),backgroundColor:CL,borderWidth:0,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{...CD.plugins,legend:{display:false}}}});
    let l5='';s.pd.forEach((x,i)=>{l5+='<div class="leg-item"><div class="leg-dot" style="background:'+CL[i%6]+'"></div><span class="leg-name">'+x.n+'</span><span class="leg-val">'+x.c+'</span><span class="leg-extra">'+fk(x.vl)+'</span></div>'});document.getElementById('leg5').innerHTML=l5;
  }

  if(activeTab==='financeiro'){
    let h='<div class="kpis">'+KPI('Faturamento',fk(s.tv),'','var(--am)')+KPI('Recebido',fk(s.tr),((s.tr/s.tv)*100).toFixed(0)+'%','var(--em)')+KPI('Lucro',fk(s.tl),'finalizados','var(--em2)')+KPI('Margem',s.mg.toFixed(1)+'%','','var(--vi)')+'</div>';
    h+='<div class="row row-2"><div class="card"><p class="card-title">Faturamento vs Recebido</p><div class="chart-box"><canvas id="ch6"></canvas></div></div><div class="card"><p class="card-title">Fornecedores</p><div class="chart-box"><canvas id="ch7"></canvas></div></div></div>';
    h+='<div class="card"><p class="card-title">Top Projetos por Lucro</p><div class="top-grid">';
    s.topL.forEach((x,i)=>{h+='<div class="top-item" style="animation-delay:'+(.05*i)+'s"><span class="top-rank" style="color:'+(i<3?'var(--am)':'var(--s500)')+'">'+String(i+1)+'</span><div class="top-info"><p class="top-name">'+x.n+' <span class="c-m" style="font-weight:400;font-size:10px">'+x.id+'</span></p><p class="top-detail">'+x.ci+'/'+x.uf+' · '+fm(x.v)+'</p></div><div class="top-right"><p class="top-lucro">'+fm(x.lu)+'</p><p class="top-pct">'+x.pl.toFixed(1)+'%</p></div></div>'});
    h+='</div></div>';
    document.getElementById('p-financeiro').innerHTML=h;
    mc('ch6',{type:'bar',data:{labels:s.md.map(m=>m.l),datasets:[{label:'Faturamento',data:s.md.map(m=>m.vl),backgroundColor:'#F6A623',borderRadius:4},{label:'Recebido',data:s.md.map(m=>m.rc),backgroundColor:'#34D399',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,...CD,scales:{...CD.scales,y:{...CD.scales.y,suggestedMax:yCap,beginAtZero:true,ticks:{...CD.scales.y.ticks,callback:v=>fk(v)}}}}});
    mc('ch7',{type:'bar',data:{labels:s.fd.map(f=>f.n),datasets:[{label:'Projetos',data:s.fd.map(f=>f.c),backgroundColor:'#A78BFA',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,...CD,plugins:{...CD.plugins,legend:{display:false}}}});
  }

  if(activeTab==='equipe'){
    let h='<div class="cons-row" style="margin-bottom:14px">';
    s.cd.forEach((c,i)=>{const p=c.v?(c.i/c.v*100).toFixed(0):0;
      h+='<div class="cons-card" style="animation-delay:'+(.06*i)+'s"><div class="cons-bar" style="background:linear-gradient(90deg,'+CL[i]+','+CL[i]+'88)"></div><h3 class="cons-name">'+c.n+'</h3><div class="cons-grid"><div><p class="cons-label">Vendas</p><p class="cons-val">'+c.v+'</p></div><div><p class="cons-label">Instalados</p><p class="cons-val" style="color:var(--em)">'+c.i+'</p></div><div><p class="cons-label">Valor Total</p><p class="cons-val-sm" style="color:var(--am)">'+fk(c.vl)+'</p></div><div><p class="cons-label">Ticket Médio</p><p class="cons-val-sm" style="color:var(--cy)">'+fk(c.tk)+'</p></div></div><div class="prog-wrap"><div class="prog-head"><span>Taxa Instalação</span><span>'+p+'%</span></div><div class="prog-track"><div class="prog-fill" style="width:'+p+'%"></div></div></div></div>'});
    h+='</div>';
    h+='<div class="row row-2"><div class="card"><p class="card-title">Volume por Consultor</p><div class="chart-box"><canvas id="ch8"></canvas></div></div><div class="card"><p class="card-title">Valor por Consultor</p><div class="chart-box"><canvas id="ch9"></canvas></div></div></div>';
    document.getElementById('p-equipe').innerHTML=h;
    mc('ch8',{type:'bar',data:{labels:s.cd.map(c=>c.n),datasets:[{label:'Vendas',data:s.cd.map(c=>c.v),backgroundColor:'#F6A623',borderRadius:4},{label:'Instalados',data:s.cd.map(c=>c.i),backgroundColor:'#34D399',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,...CD}});
    mc('ch9',{type:'bar',data:{labels:s.cd.map(c=>c.n),datasets:[{label:'Valor',data:s.cd.map(c=>c.vl),backgroundColor:'#22D3EE',borderRadius:4},{label:'Recebido',data:s.cd.map(c=>c.rc),backgroundColor:'#34D399',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,...CD,scales:{...CD.scales,y:{...CD.scales.y,ticks:{...CD.scales.y.ticks,callback:v=>fk(v)}}}}});
  }

  if(activeTab==='projetos'){
    let h='<div class="kpis">'+KPI('Placas',s.tp.toLocaleString('pt-BR'),'','var(--cy)')+KPI('Potência',s.pw.toFixed(1)+' kWp','','var(--am)')+KPI('Instalados',s.ni+'/'+s.t,((s.ni/s.t)*100).toFixed(0)+'%','var(--em)')+KPI('Aguardando',String(s.t-s.ni),'','var(--ro)')+'</div>';
    h+='<div class="row row-2"><div class="card"><p class="card-title">Status Equipamento</p><div class="chart-box" style="height:170px"><canvas id="ch10"></canvas></div><div id="leg10" style="margin-top:8px"></div></div><div class="card"><p class="card-title">Fornecedores</p>';
    s.fd.forEach((f,i)=>{h+='<div class="forn-item"><div class="forn-badge" style="background:'+CL[i%6]+'22;color:'+CL[i%6]+'">'+f.c+'</div><div style="flex:1;min-width:0"><p class="bold" style="font-size:12px">'+f.n+'</p><p style="font-size:10px;color:var(--s500)">'+f.c+' proj.</p></div><span class="mono bold c-am" style="font-size:11px">'+fk(f.vk)+'</span></div>'});
    h+='</div></div>';
    h+='<div class="card"><p class="card-title">Projetos ('+d.length+')</p><div class="table-wrap"><table><thead><tr><th>Cód.</th><th>Cliente</th><th>Cidade</th><th>Cons.</th><th class="r">Valor</th><th class="r">Plc</th><th class="c">Pgto</th><th class="c">Inst.</th></tr></thead><tbody>';
    d.forEach(r=>{h+='<tr><td class="mono c-am bold">'+r.id+'</td><td class="semi" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px">'+r.n+'</td><td class="c-m">'+(r.ci||'—')+'</td><td class="c-m">'+r.co+'</td><td class="r mono semi">'+fk(r.v)+'</td><td class="r mono">'+(r.qp||'—')+'</td><td class="c"><span class="badge '+bc(r.st)+'">'+r.st+'</span></td><td class="c"><span class="badge '+(r.ins?'b-ok':'b-muted')+'">'+(r.ins?'Sim':'Não')+'</span></td></tr>'});
    h+='</tbody></table></div></div>';
    document.getElementById('p-projetos').innerHTML=h;
    mc('ch10',{type:'doughnut',data:{labels:s.ed.map(e=>e.n||'N/A'),datasets:[{data:s.ed.map(e=>e.v),backgroundColor:CL,borderWidth:0,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{...CD.plugins,legend:{display:false}}}});
    let l10='';s.ed.forEach((e,i)=>{l10+='<div class="leg-item"><div class="leg-dot" style="background:'+CL[i%6]+'"></div><span class="leg-name">'+(e.n||'N/A')+'</span><span class="leg-val">'+e.v+'</span></div>'});document.getElementById('leg10').innerHTML=l10;
  }

  if(activeTab==='alertas'){
    const nq=d.filter(x=>x.st==='Não Quitado'),fp=d.filter(x=>x.st==='Falta Partes'),nl=d.filter(x=>!x.lib),pc=d.filter(x=>x.sp==='Comprar');
    let h='<div class="kpis">'+KPI('Não Quitados',String(nq.length),'','var(--am)')+KPI('Falta Partes',String(fp.length),'','var(--ro)')+KPI('Não Liberados',String(nl.length),'','var(--vi)')+KPI('P/ Comprar',String(pc.length),'','var(--cy)')+'</div>';
    h+='<div class="card" style="margin-bottom:10px"><p class="card-title">Pagamento Pendente</p>';
    const pend=d.filter(x=>x.st!=='Quitado');
    if(!pend.length)h+='<p class="empty-msg">Nenhum pendente!</p>';
    else pend.forEach((r,i)=>{h+='<div class="alert-item '+(r.st==='Falta Partes'?'alert-be':'alert-bw')+'" style="animation-delay:'+(.04*i)+'s"><span class="mono bold c-am" style="font-size:11px;min-width:40px">'+r.id+'</span><div style="flex:1;min-width:0"><p class="bold" style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+r.n+' <span class="c-m" style="font-weight:400;font-size:10px">· '+r.co+'</span></p><p style="font-size:10px;color:var(--s500)">'+(r.ci||'—')+(r.uf?'/'+r.uf:'')+' · '+(r.fp||'—')+'</p></div><div style="text-align:right;flex-shrink:0"><p class="mono bold c-am" style="font-size:13px">'+fk(r.v)+'</p><p style="font-size:9px;color:var(--s500)">Rec: <span style="color:'+(r.r>0?'var(--em)':'var(--ro)')+'">'+fk(r.r)+'</span></p></div></div>'});
    h+='</div>';
    h+='<div class="card"><p class="card-title">Equipamentos p/ Comprar</p>';
    if(!pc.length)h+='<p class="empty-msg">Nenhum pendente!</p>';
    else{h+='<div class="equip-grid">';pc.forEach(r=>{h+='<div class="equip-item"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span class="bold" style="font-size:11px">'+r.id+' — '+r.n+'</span><span style="font-size:9px;color:var(--s500)">'+r.fo+'</span></div><p style="font-size:10px;color:var(--s400)">'+r.qp+'x '+r.mp+' · '+r.qi+'x '+r.mi+'</p></div>'});h+='</div>'}
    h+='</div>';
    document.getElementById('p-alertas').innerHTML=h;
  }
}

function clearFilters(){document.getElementById('searchInput').value='';document.getElementById('fConsultor').value='Todos';document.getElementById('fStatus').value='Todos';render()}
document.getElementById('searchInput').addEventListener('input',render);
document.getElementById('fConsultor').addEventListener('change',render);
document.getElementById('fStatus').addEventListener('change',render);
render();
</script>
</body>
</html>
