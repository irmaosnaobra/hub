<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gerador de Proposta Solar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:.75rem;-webkit-tap-highlight-color:transparent}
.app{max-width:700px;margin:0 auto}
.header{background:#0d2d5e;border-radius:12px;padding:1rem 1.25rem;color:white;margin-bottom:1rem;display:flex;align-items:center;gap:12px;border-left:5px solid #f5c518}
.header h2{font-size:17px;font-weight:700;color:white;margin:0}
.header p{font-size:12px;color:rgba(255,255,255,0.65);margin-top:2px}
.sun{width:40px;height:40px;min-width:40px;background:rgba(245,197,24,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.form-card{background:#fff;border:1px solid #d0d8e8;border-radius:12px;padding:1rem;margin-bottom:.75rem}
.form-title{font-size:11px;font-weight:700;color:#f5c518;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.85rem}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:13px;color:#555;font-weight:500}
.field input,.field select{padding:10px 11px;border:1.5px solid #d0d8e8;border-radius:8px;font-size:15px;background:#fff;color:#222;width:100%;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{outline:none;border-color:#0d2d5e}
.field.full{grid-column:1/-1}
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.toggle-label{font-size:13px;color:#555;font-weight:500}
.toggle-wrap{display:flex;background:#f0f4f8;border:1.5px solid #d0d8e8;border-radius:8px;overflow:hidden}
.toggle-btn{padding:8px 16px;font-size:13px;font-weight:600;border:none;background:transparent;color:#888;cursor:pointer}
.toggle-btn.active{background:#0d2d5e;color:white}
.btn-gerar{width:100%;padding:14px;background:#0d2d5e;color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-gerar:active{background:#0a2249;transform:scale(.99)}
.proposta{display:none}
.proposta.show{display:block}
.p-header{background:#0d2d5e;border-radius:12px;padding:1.25rem;color:white;margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center;border-left:5px solid #f5c518}
.p-header h1{font-size:18px;font-weight:700;color:white;margin:0}
.p-header p{font-size:12px;color:rgba(255,255,255,0.6);margin-top:3px}
.client-row{background:#fff;border:1px solid #d0d8e8;border-radius:12px;padding:.9rem 1rem;margin-bottom:.75rem;display:flex;align-items:center;gap:10px}
.avatar{width:44px;height:44px;min-width:44px;border-radius:50%;background:#dde8f8;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#0d2d5e}
.metrics3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.75rem}
.met{background:#f0f4f8;border-radius:8px;padding:.8rem .5rem;text-align:center;border-bottom:3px solid #f5c518}
.met .lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.met .val{font-size:18px;font-weight:700;color:#0d2d5e}
.met .uni{font-size:10px;color:#888;margin-top:2px}
.sec{background:#fff;border:1px solid #d0d8e8;border-radius:12px;padding:.9rem 1rem;margin-bottom:.75rem}
.sec-t{font-size:11px;font-weight:700;color:#f5c518;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.8rem}
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.si .sl{font-size:11px;color:#888}
.si .sv{font-size:14px;font-weight:700;color:#222;margin-top:1px}
.inc-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.inc{display:flex;align-items:center;gap:7px;font-size:13px;color:#222}
.chk{width:17px;height:17px;min-width:17px;border-radius:50%;background:#f5c518;display:flex;align-items:center;justify-content:center;font-size:9px;color:#0d2d5e;font-weight:700}
.gars{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.gar{text-align:center;padding:.7rem .4rem;background:#f0f4f8;border-radius:8px;border-top:3px solid #f5c518}
.gar .yrs{font-size:18px;font-weight:700;color:#0d2d5e}
.gar .gt{font-size:11px;color:#888;margin-top:2px}
.roi-sec{background:#fff;border:1px solid #d0d8e8;border-radius:12px;padding:.9rem 1rem;margin-bottom:.75rem}
.roi-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;gap:8px}
.roi-l{font-size:13px;color:#888}
.roi-v{font-size:14px;font-weight:700;color:#222;white-space:nowrap}
.prog-track{background:#e0e8f0;border-radius:99px;height:8px;margin-top:4px}
.prog-fill{height:8px;border-radius:99px;background:#0d2d5e}
.price-box{background:#0d2d5e;border-radius:12px;padding:1.25rem;text-align:center;margin-bottom:.75rem;border-bottom:4px solid #f5c518}
.price-box .pl{font-size:13px;color:rgba(255,255,255,0.65);margin-bottom:5px}
.price-box .pv{font-size:28px;font-weight:700;color:white}
.price-box .ps{font-size:11px;color:rgba(255,255,255,0.45);margin-top:4px}
.parcelas{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:.75rem}
.parc{background:#f0f4f8;border-radius:8px;padding:.85rem .5rem;text-align:center;border:1px solid #d0d8e8}
.parc.destaque{background:#0d2d5e;border:2px solid #f5c518}
.parc .pl{font-size:11px;color:#888;margin-bottom:4px}
.parc.destaque .pl{color:#f5c518;font-weight:700}
.parc .pv{font-size:16px;font-weight:700;color:#222}
.parc.destaque .pv{color:white;font-size:18px}
.parc .pp{font-size:10px;color:#888;margin-top:2px}
.parc.destaque .pp{color:rgba(255,255,255,0.55)}
.badge{display:inline-block;background:#f5c518;color:#0d2d5e;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;margin-top:4px;text-transform:uppercase;letter-spacing:.4px}
.footer-p{text-align:center;font-size:11px;color:#aaa;padding:.25rem 0 .75rem}
.acoes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.75rem}
.btn-acao{padding:14px 8px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:7px;width:100%}
.btn-pdf{background:#0d2d5e;color:white}
.btn-pdf:active{background:#0a2249}
.btn-zap{background:#25D366;color:white}
.btn-zap:active{background:#1da851}
.btn-nova{width:100%;padding:11px;background:transparent;color:#0d2d5e;border:1.5px solid #0d2d5e;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:.75rem}
.erro{background:#fdf0f0;border:1px solid #f09595;color:#a32d2d;border-radius:8px;padding:.7rem 1rem;font-size:13px;margin-top:.5rem;display:none}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:#222;color:white;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media print{
  body{background:#111!important;padding:0;margin:0}
  .btn-nova,.acoes,.header,.footer-p{display:none!important}
  #formSection{display:none!important}
  .proposta{display:block!important;max-width:100%!important;margin:0!important;padding:8px!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  @page{margin:0;size:A4}
}
@media(max-width:480px){
  .fields,.spec-grid,.inc-grid,.gars{grid-template-columns:1fr}
  .field.full{grid-column:1}
  .parcelas{grid-template-columns:1fr}
  .parc.destaque{order:-1}
  .acoes{grid-template-columns:1fr}
  .metrics3{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:340px){
  .metrics3{grid-template-columns:1fr 1fr}
  .parcelas{grid-template-columns:1fr}
}
</style>
</head>

let modoAtual='kwh';
let dadosProposta=null;

function setModo(m){
  modoAtual=m;
  document.getElementById('btn-kwh').className='toggle-btn'+(m==='kwh'?' active':'');
  document.getElementById('btn-placas').className='toggle-btn'+(m==='placas'?' active':'');
  document.getElementById('input-kwh').style.display=m==='kwh'?'':'none';
  document.getElementById('input-placas').style.display=m==='placas'?'':'none';
}

function fmt(n){return Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtN(n){return Math.round(n).toLocaleString('pt-BR')}
function initials(n){const p=n.trim().split(' ');return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.substring(0,2).toUpperCase()}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(()=>{t.className='toast'},2600)}

function gerar(){
  const nome=document.getElementById('f-nome').value.trim();
  const cidade=document.getElementById('f-cidade').value.trim();
  const telhado=document.getElementById('f-telhado').value;
  const fase=document.getElementById('f-fase').value;
  const linha=document.getElementById('f-linha').value;
  const erroEl=document.getElementById('erro');
  erroEl.style.display='none';

  if(!nome||!cidade||!telhado||!fase||!linha){
    erroEl.textContent='Preencha todos os campos antes de gerar a proposta.';
    erroEl.style.display='block';return;
  }

  const tab=TABELAS[linha];
  let item;

  if(modoAtual==='kwh'){
    const consumo=parseFloat(document.getElementById('f-consumo').value);
    if(!consumo||consumo<=0){erroEl.textContent='Informe o consumo mensal em kWh.';erroEl.style.display='block';return;}
    item=tab.rows.find(r=>r.g>=consumo)||tab.rows[tab.rows.length-1];
  } else {
    const qtd=parseInt(document.getElementById('f-qtd').value);
    if(!qtd||qtd<=0){erroEl.textContent='Informe a quantidade de placas.';erroEl.style.display='block';return;}
    item=tab.rows.reduce((a,b)=>Math.abs(b.n-qtd)<Math.abs(a.n-qtd)?b:a);
  }

  const areaReal=(item.kwp*1000/tab.pot*2.1).toFixed(1);
  const tarifa=parseFloat(document.getElementById('f-tarifa').value)||1.09;
  const taxaMin=parseFloat(document.getElementById('f-taxamin').value)||95;
  const economia=Math.max(Math.round(item.g*tarifa-taxaMin),0);
  const payback=(item.p/(economia*12)).toFixed(1);
  const economia25=economia*12*25;
  const pbPct=Math.min(Math.round((parseFloat(payback)/25)*100),100);
  const parc6x=Math.round(item.p/6*100)/100;
  const parc10x11=Math.round(item.p*1.11/10*100)/100;

  const meses=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const hoje=new Date();
  const dataStr=`${meses[hoje.getMonth()]} de ${hoje.getFullYear()}`;

  dadosProposta={nome,cidade,telhado,fase,tab,item,areaReal,economia,payback,economia25,pbPct,parc6x,dataStr};

  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>showToast('✅ Copiado! Cole no WhatsApp')).catch(()=>fallbackCopy(txt));
  } else { fallbackCopy(txt); }
}

function fallbackCopy(txt){
  const ta=document.createElement('textarea');
  ta.value=txt;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');showToast('✅ Copiado! Cole no WhatsApp');}
  catch(e){showToast('Erro ao copiar. Tente novamente.')}
  document.body.removeChild(ta);
}
